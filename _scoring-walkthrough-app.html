<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<div id="mst-walkthrough-root" style="border-radius:8px; overflow:hidden; border:1px solid #1e3a5f;"></div>
<script>
"use strict";
var e = React.createElement;
var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef, useMemo = React.useMemo;

var C = {
  bg:"#0a1628", panel:"#111d33", panelLight:"#18283f", border:"#1e3a5f",
  accent:"#3b82f6", accentDim:"#2563eb44", text:"#e2e8f0", textDim:"#94a3b8",
  textMuted:"#475569", green:"#10b981", amber:"#f59e0b", red:"#ef4444",
  cyan:"#06b6d4", purple:"#8b5cf6", pink:"#ec4899", orange:"#f97316", lime:"#84cc16"
};
var SP_COLORS = {
  bird:"#f59e0b", coral:"#ec4899", fish:"#3b82f6", invertebrate:"#8b5cf6",
  mammal:"#10b981", other:"#94a3b8", turtle:"#06b6d4", primprod:"#84cc16"
};

function spectral(val) {
  var t = Math.max(0, Math.min(1, val / 100));
  var stops = [[0,.05,[49,54,149]],[.05,.2,[69,117,180]],[.2,.35,[116,173,209]],
    [.35,.5,[171,217,233]],[.5,.6,[254,224,144]],[.6,.75,[253,174,97]],
    [.75,.9,[244,109,67]],[.9,1,[215,48,39]]];
  for (var i=0;i<stops.length;i++) { if (t <= stops[i][1]) return "rgb("+stops[i][2][0]+","+stops[i][2][1]+","+stops[i][2][2]+")"; }
  return "rgb(215,48,39)";
}
function makeCS(lo, hi, loC, hiC) {
  var p = function(h){return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];};
  var a = p(loC), b = p(hiC);
  return function(v) {
    var t = Math.max(0, Math.min(1, (v - lo) / (hi - lo || 1)));
    return "rgb("+Math.round(a[0]+t*(b[0]-a[0]))+","+Math.round(a[1]+t*(b[1]-a[1]))+","+Math.round(a[2]+t*(b[2]-a[2]))+")";
  };
}
function sRng(seed) { var s=seed; return function(){ s=(s*16807)%2147483647; return(s-1)/2147483646; }; }

// --- PixelGrid with staggered fade-in ---
function PixelGrid(props) {
  var data=props.data, cols=props.cols, cellSize=props.cellSize||32, colorScale=props.colorScale, label=props.label, highlight=props.highlight, showValues=props.showValues, animate=props.animate;
  var visState = useState(animate ? data.map(function(){return false;}) : data.map(function(){return true;}));
  var vis = visState[0], setVis = visState[1];

  useEffect(function() {
    if (!animate) { setVis(data.map(function(){return true;})); return; }
    setVis(data.map(function(){return false;}));
    var timers = data.map(function(_,i) {
      return setTimeout(function(){ setVis(function(prev){ var next=prev.slice(); next[i]=true; return next; }); }, i*40);
    });
    return function(){ timers.forEach(clearTimeout); };
  }, [animate, data.length]);

  return e("div", {style:{textAlign:"center"}},
    label && e("div", {style:{fontSize:11, color:C.textDim, marginBottom:4, fontWeight:600, letterSpacing:"0.05em", textTransform:"uppercase"}}, label),
    e("div", {style:{display:"inline-grid", gridTemplateColumns:"repeat("+cols+", "+cellSize+"px)", gap:1}},
      data.map(function(val, i) {
        var isHL = highlight && highlight.indexOf(i) >= 0;
        return e("div", {key:i, style:{
          width:cellSize, height:cellSize,
          backgroundColor: val===null ? "#1a1a2e" : colorScale(val),
          borderRadius:3, display:"flex", alignItems:"center", justifyContent:"center",
          fontSize: cellSize<28?9:(val!==null&&val>99?9:11), fontWeight:600,
          color: val!==null && val>60 ? "#000" : C.text,
          opacity: vis[i] ? (highlight && !isHL ? 0.3 : 1) : 0,
          border: isHL ? "2px solid "+C.accent : "1px solid #0004",
          transition:"all 0.5s ease", cursor:"default"
        }}, showValues!==false && val!==null ? Math.round(val) : "");
      })
    )
  );
}


function Formula(props) {
  return e("div", {style:{background:"#0d1520", border:"1px solid "+C.border, borderRadius:8, padding:"12px 16px", margin:"12px 0", fontFamily:"monospace", fontSize:13, color:C.cyan, lineHeight:1.7}},
    e("div", null, props.tex),
    props.note && e("div", {style:{color:C.textDim, fontSize:11, marginTop:4, fontFamily:"system-ui"}}, props.note)
  );
}

function FadeIn(props) {
  var ref = useRef(null);
  var state = useState(false);
  var visible = state[0], setVisible = state[1];
  useEffect(function() {
    var t = setTimeout(function(){ setVisible(true); }, props.delay || 0);
    return function(){ clearTimeout(t); };
  }, []);
  return e("div", {ref:ref, style:{opacity:visible?1:0, transform:visible?"translateY(0)":"translateY(12px)", transition:"all 0.6s ease"}}, props.children);
}

function AnimNum(props) {
  var value = props.value, duration = props.duration || 600;
  var state = useState(value);
  var display = state[0], setDisplay = state[1];
  var ref = useRef(null);
  useEffect(function() {
    var start = display, diff = value - start, t0 = performance.now();
    var animate = function(t) {
      var p = Math.min(1, (t-t0)/duration);
      setDisplay(Math.round(start + diff*(1-Math.pow(1-p,3))));
      if (p < 1) ref.current = requestAnimationFrame(animate);
    };
    ref.current = requestAnimationFrame(animate);
    return function() { cancelAnimationFrame(ref.current); };
  }, [value]);
  return e("span", null, display);
}

// --- data generation (5x5 grid) ---
function genData() {
  var rng = sRng(42), R = 5, CC = 5;
  var aquamaps = Array.from({length:R*CC}, function(_,i) {
    var row=Math.floor(i/CC), col=i%CC;
    var d = Math.sqrt(Math.pow(col-2,2)+Math.pow(row-2,2));
    return Math.min(100, Math.max(1, Math.round(80 - d*30 + rng()*12)));
  });
  var critHab = Array.from({length:R*CC}, function(_,i) {
    var row=Math.floor(i/CC), col=i%CC;
    if(row>=1&&row<=2&&col>=1&&col<=2) return 100;
    if(row>=2&&row<=3&&col>=3) return 50;
    return null;
  });
  var fwsRange = Array.from({length:R*CC}, function(_,i) {
    var row=Math.floor(i/CC), col=i%CC;
    return (col<=3&&row<=3) ? 1 : null;
  });
  var merged = Array.from({length:R*CC}, function(_,i) {
    var v = [aquamaps[i],critHab[i],fwsRange[i]].filter(function(x){return x!==null;});
    return v.length ? Math.max.apply(null,v) : null;
  });
  var maskExt = Array.from({length:R*CC}, function(_,i) { return critHab[i]!==null||fwsRange[i]!==null; });
  var masked = merged.map(function(v,i) { return maskExt[i] ? v : null; });

  // turtle-specific data
  var swotDps = Array.from({length:R*CC}, function(_,i) {
    var row=Math.floor(i/CC), col=i%CC;
    if (col<=2 && row<=3) return 100; // endangered DPS
    if (col>=3 && row<=2) return 50;  // threatened DPS
    return null;
  });
  var turtleSuit = Array.from({length:R*CC}, function(_,i) {
    var row=Math.floor(i/CC), col=i%CC;
    var d = Math.sqrt(Math.pow(col-1.5,2)+Math.pow(row-1.5,2));
    return Math.min(100, Math.max(1, Math.round(90 - d*20 + rng()*10)));
  });
  var turtleMerged = Array.from({length:R*CC}, function(_,i) {
    if (swotDps[i]===null) return null;
    return Math.max(1, Math.round(swotDps[i] * turtleSuit[i] / 100));
  });
  // CH override for turtle
  var turtleCH = Array.from({length:R*CC}, function(_,i) {
    var row=Math.floor(i/CC), col=i%CC;
    if(row===1&&col===1) return 100;
    return null;
  });
  var turtleFinal = turtleMerged.map(function(v,i) {
    if(v===null) return null;
    return turtleCH[i]!==null ? Math.max(v, turtleCH[i]) : v;
  });

  var eco = Array.from({length:R*CC}, function(_,i) { return (i%CC)<3 ? "A" : "B"; });
  // raw scores are summed ER-weighted species contributions — values in the hundreds
  var mkRaw = function(seed) { var r=sRng(seed); return Array.from({length:R*CC}, function(){
    return Math.round(Math.min(800, Math.max(50, 150+r()*500)));
  }); };
  var rawB=mkRaw(100), rawM=mkRaw(200), rawF=mkRaw(300);
  var gmm = function(arr,el) { var v=arr.filter(function(_,i){return eco[i]===el;}); return {min:Math.min.apply(null,v),max:Math.max.apply(null,v)}; };
  var rsc = function(arr) { return arr.map(function(v,i) {
    var mm=gmm(arr,eco[i]);
    return Math.round(mm.max>mm.min ? (v-mm.min)/(mm.max-mm.min)*100 : 50);
  }); };
  var rB=rsc(rawB), rM=rsc(rawM), rF=rsc(rawF);
  var avg = Array.from({length:R*CC}, function(_,i) { return Math.round((rB[i]+rM[i]+rF[i])/3); });
  return {
    R:R, C:CC, aquamaps:aquamaps, critHab:critHab, fwsRange:fwsRange,
    merged:merged, masked:masked, maskExt:maskExt, eco:eco,
    swotDps:swotDps, turtleSuit:turtleSuit, turtleMerged:turtleMerged, turtleCH:turtleCH, turtleFinal:turtleFinal,
    rawB:rawB, rawM:rawM, rawF:rawF, rB:rB, rM:rM, rF:rF, avg:avg,
    bMM:{A:gmm(rawB,"A"),B:gmm(rawB,"B")},
    mMM:{A:gmm(rawM,"A"),B:gmm(rawM,"B")},
    fMM:{A:gmm(rawF,"A"),B:gmm(rawF,"B")}
  };
}

var STEPS = [
  {id:"intro",title:"Overview",icon:"\uD83D\uDDFA\uFE0F"},
  {id:"inputs",title:"Input Rasters",icon:"\uD83D\uDCCA"},
  {id:"maxmerge",title:"MAX Merge",icon:"\u2B06\uFE0F"},
  {id:"turtlemerge",title:"Turtle Merge",icon:"\uD83D\uDC22"},
  {id:"masking",title:"Spatial Masking",icon:"\u2702\uFE0F"},
  {id:"floors",title:"Regulatory Floors",icon:"\uD83D\uDEE1\uFE0F"},
  {id:"erweight",title:"ER Weighting",icon:"\u2696\uFE0F"},
  {id:"ecorescale",title:"Ecoregional Rescaling",icon:"\uD83C\uDF0A"},
  {id:"component",title:"Component Averaging",icon:"\uD83D\uDCD0"},
  {id:"final",title:"Final Score",icon:"\uD83C\uDFC1"}
];

function App() {
  var stepState = useState(0);
  var step = stepState[0], setStep = stepState[1];
  var animState = useState(0);
  var anim = animState[0], setAnim = animState[1];
  var fsState = useState(false);
  var isFS = fsState[0], setIsFS = fsState[1];
  var rootRef = useRef(null);
  var data = useMemo(genData, []);
  var cs = 32;

  var toggleFS = function() {
    var el = rootRef.current || document.getElementById("mst-walkthrough-root");
    if (!document.fullscreenElement) {
      (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
    }
  };
  useEffect(function() {
    var handler = function() { setIsFS(!!document.fullscreenElement); };
    document.addEventListener("fullscreenchange", handler);
    return function() { document.removeEventListener("fullscreenchange", handler); };
  }, []);

  var prev = function() { setStep(function(s){return Math.max(0,s-1);}); setAnim(0); };
  var next = function() { setStep(function(s){return Math.min(STEPS.length-1,s+1);}); setAnim(0); };

  // auto-advance animations
  useEffect(function() {
    var sid = STEPS[step].id;
    if (sid==="maxmerge" && anim<2) {
      var t = setTimeout(function(){setAnim(function(p){return p+1;});}, 1000);
      return function(){clearTimeout(t);};
    }
    if (sid==="turtlemerge" && anim<2) {
      var t2 = setTimeout(function(){setAnim(function(p){return p+1;});}, 1000);
      return function(){clearTimeout(t2);};
    }
  }, [step, anim]);

  useEffect(function() {
    var handler = function(ev) {
      if (ev.key === "ArrowRight" || ev.key === " ") { ev.preventDefault(); next(); }
      if (ev.key === "ArrowLeft") { ev.preventDefault(); prev(); }
    };
    window.addEventListener("keydown", handler);
    return function() { window.removeEventListener("keydown", handler); };
  });

  var suitSc = makeCS(0,100,"#1a1a3e","#22d3ee");
  var critSc = function(v) { return v>=100?"#ef4444":v>=50?"#f59e0b":"#1a1a2e"; };
  var rngSc = function(v) { return v>=1?"#374151":"#1a1a2e"; };
  var erSc = function(v) { return v>=100?"#ef4444":v>=50?"#f59e0b":"#1a1a2e"; };
  var rawSc = makeCS(50,800,"#1a1a3e","#ef4444");

  function renderStep() {
    var sid = STEPS[step].id;

    // --- step: overview ---
    if (sid==="intro") {
      var items=[
        {label:"Input Rasters",desc:"8 datasets per species",color:C.cyan},
        {label:"MAX Merge",desc:"Highest value wins per cell",color:C.green},
        {label:"Turtle Merge",desc:"Suitability \u00D7 ER raster",color:C.cyan},
        {label:"Spatial Masking",desc:"Constrain to known ranges",color:C.amber},
        {label:"Regulatory Floors",desc:"MMPA (20) & MBTA (10)",color:C.purple},
        {label:"ER Weighting",desc:"Weight by conservation status",color:C.red},
        {label:"Ecoregional Rescaling",desc:"Normalize within ecoregions",color:C.orange},
        {label:"Component Averaging",desc:"8 categories, equal weights",color:C.pink},
        {label:"Final Score",desc:"Aggregate to Program Areas",color:C.accent}
      ];
      return e("div",{style:{maxWidth:700,margin:"0 auto"}},
        e("h2",{style:{color:C.text,fontSize:22,fontWeight:700,marginBottom:16}},"Marine Sensitivity Toolkit: Scoring Pipeline"),
        e("p",{style:{color:C.textDim,lineHeight:1.7,marginBottom:16}},"This walkthrough shows how the MST calculates sensitivity scores for offshore energy planning. The pipeline transforms species distribution models from 8 datasets into a single composite score per 0.05\u00B0 grid cell."),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:20}},
          items.map(function(it,i){return e("div",{key:i,onClick:function(){setStep(i+1);setAnim(0);},style:{background:C.panelLight,border:"1px solid "+C.border,borderRadius:8,padding:"8px 12px",cursor:"pointer",borderLeft:"3px solid "+it.color,transition:"background 0.2s"}},
            e("div",{style:{color:it.color,fontWeight:600,fontSize:12}},it.label),
            e("div",{style:{color:C.textDim,fontSize:10,marginTop:2}},it.desc));
          })
        ),
        e("div",{style:{marginTop:20,padding:14,background:"#0d1520",borderRadius:8,border:"1px solid "+C.border}},
          e("div",{style:{color:C.textDim,fontSize:12,lineHeight:1.7}},
            e("strong",{style:{color:C.text}},"Pipeline: "),
            "Inputs \u2192 MAX Merge (or Turtle \u00D7 Merge) \u2192 Masking \u2192 Floors \u2192 ER Weighting \u2192 Rescaling \u2192 Averaging \u2192 Score")
        )
      );
    }

    // --- step: inputs ---
    if (sid==="inputs") {
      return e("div",null,
        e("h3",{style:{color:C.text,fontSize:18,fontWeight:700,marginBottom:8}},"Step 1: Input Rasters"),
        e("p",{style:{color:C.textDim,fontSize:13,lineHeight:1.6,marginBottom:16}},"For each species, up to 8 source datasets provide spatial data. Values encode both presence and conservation status. Here are 3 inputs for one species on a 5\u00D75 grid."),
        e("div",{style:{display:"flex",gap:20,justifyContent:"center",flexWrap:"wrap"}},
          e(FadeIn,{delay:0},
            e(PixelGrid,{data:data.aquamaps,cols:data.C,cellSize:cs,colorScale:suitSc,label:"AquaMaps SDM [1\u2013100]",animate:true}),
            e("div",{style:{fontSize:10,color:C.cyan,marginTop:4,textAlign:"center"}},"Continuous suitability")),
          e(FadeIn,{delay:300},
            e(PixelGrid,{data:data.critHab,cols:data.C,cellSize:cs,colorScale:critSc,label:"NMFS Critical Habitat"}),
            e("div",{style:{display:"flex",gap:8,justifyContent:"center",marginTop:4,fontSize:10}},
              e("span",{style:{color:"#ef4444"}},"\u25A0 EN: 100"),
              e("span",{style:{color:"#f59e0b"}},"\u25A0 TN: 50"))),
          e(FadeIn,{delay:600},
            e(PixelGrid,{data:data.fwsRange,cols:data.C,cellSize:cs,colorScale:rngSc,label:"FWS Range [LC: 1]"}),
            e("div",{style:{fontSize:10,color:C.textDim,marginTop:4,textAlign:"center"}},"Binary mask with status"))
        ),
        e(FadeIn,{delay:900},
          e("div",{style:{marginTop:16,padding:12,background:"#0d1520",borderRadius:8,border:"1px solid "+C.border}},
            e("div",{style:{fontSize:12,color:C.textDim,lineHeight:1.6}},
              e("strong",{style:{color:C.amber}},"All 8 datasets: "),"AquaMaps SDM, NMFS Core Area, NMFS Critical Habitat, FWS Critical Habitat, FWS Range, BirdLife Range, IUCN Range, SWOT+DPS Turtle Range.")))
      );
    }

    // --- step: MAX merge ---
    if (sid==="maxmerge") {
      var oc=data.critHab.map(function(ch,i){return ch!==null&&ch>data.aquamaps[i]?i:-1;}).filter(function(i){return i>=0;});
      return e("div",null,
        e("h3",{style:{color:C.text,fontSize:18,fontWeight:700,marginBottom:8}},"Step 2: MAX Merge (Standard)"),
        e("p",{style:{color:C.textDim,fontSize:13,lineHeight:1.6,marginBottom:12}},"For most species, the maximum value across all datasets is taken per cell. Critical habitat (100) overrides AquaMaps suitability (30)."),
        e(Formula,{tex:"v_merged(c) = max( v_aquamaps, v_critHab, v_fwsRange, ... )",note:"Per-cell maximum across all available datasets"}),
        e("div",{style:{display:"flex",gap:12,justifyContent:"center",alignItems:"center",flexWrap:"wrap"}},
          e(PixelGrid,{data:data.aquamaps,cols:data.C,cellSize:cs-2,colorScale:suitSc,label:"AquaMaps",highlight:anim>=1?oc:null}),
          e("div",{style:{fontSize:22,color:C.textDim}},"+"),
          e(PixelGrid,{data:data.critHab,cols:data.C,cellSize:cs-2,colorScale:critSc,label:"Critical Habitat",highlight:anim>=1?oc:null}),
          e("div",{style:{fontSize:22,color:C.textDim}},"\u2192"),
          e("div",{style:{opacity:anim>=2?1:0.15,transition:"opacity 0.8s ease"}},
            e(PixelGrid,{data:data.merged,cols:data.C,cellSize:cs-2,colorScale:suitSc,label:"Merged (MAX)",highlight:anim>=2?oc:null}))
        ),
        anim>=2 && e(FadeIn,{delay:200},
          e("div",{style:{marginTop:12,padding:10,background:C.panelLight,borderRadius:6,textAlign:"center",fontSize:12,color:C.green}},
            "Highlighted: Critical Habitat values override lower AquaMaps suitability"))
      );
    }

    // --- step: turtle merge (NEW) ---
    if (sid==="turtlemerge") {
      return e("div",null,
        e("h3",{style:{color:C.text,fontSize:18,fontWeight:700,marginBottom:8}},"Step 2b: Turtle Multiplicative Merge"),
        e("p",{style:{color:C.textDim,fontSize:13,lineHeight:1.6,marginBottom:12}},
          "Sea turtles use a different approach: the SWOT+DPS extinction risk raster is ",e("strong",{style:{color:C.cyan}},"multiplied")," with the suitability raster during merging. This embeds spatially varying ER directly in the merged values."),
        e(Formula,{tex:"v(c) = max(1, round( er(c) \u00D7 suit(c) / 100 ))",note:"er(c) from SWOT+DPS: EN=100, TN=50. Critical habitat cells override via max."}),
        e("div",{style:{display:"flex",gap:24,justifyContent:"center",flexWrap:"wrap",marginTop:8}},
          // left: standard MAX (recap)
          e("div",{style:{background:C.panelLight,borderRadius:10,padding:14,border:"1px solid "+C.border,flex:"1 1 200px",maxWidth:260}},
            e("div",{style:{fontSize:12,fontWeight:700,color:C.green,marginBottom:8,textAlign:"center"}},"\u2191 Standard (MAX Merge)"),
            e("div",{style:{display:"flex",gap:6,justifyContent:"center",alignItems:"center",flexWrap:"wrap"}},
              e(PixelGrid,{data:data.aquamaps,cols:data.C,cellSize:22,colorScale:suitSc,label:"Suitability",showValues:false}),
              e("div",{style:{fontSize:16,color:C.textDim}},"\u2192"),
              e(PixelGrid,{data:data.merged,cols:data.C,cellSize:22,colorScale:suitSc,label:"MAX",showValues:false})
            ),
            e("div",{style:{fontSize:10,color:C.textDim,marginTop:6,textAlign:"center"}},"ER applied later as scalar")
          ),
          // right: turtle multiplicative
          e("div",{style:{background:C.panelLight,borderRadius:10,padding:14,border:"2px solid "+C.cyan,flex:"1 1 340px",maxWidth:440}},
            e("div",{style:{fontSize:12,fontWeight:700,color:C.cyan,marginBottom:8,textAlign:"center"}},"\uD83D\uDC22 Turtle (Multiplicative Merge)"),
            e("div",{style:{display:"flex",gap:6,justifyContent:"center",alignItems:"center",flexWrap:"wrap"}},
              e(PixelGrid,{data:data.swotDps,cols:data.C,cellSize:22,colorScale:erSc,label:"SWOT+DPS ER"}),
              e("div",{style:{fontSize:16,color:C.textDim}},"\u00D7"),
              e(PixelGrid,{data:data.turtleSuit,cols:data.C,cellSize:22,colorScale:suitSc,label:"Suitability"}),
              e("div",{style:{fontSize:16,color:C.textDim}},"\u2192"),
              e("div",{style:{opacity:anim>=1?1:0.15,transition:"opacity 0.8s ease"}},
                e(PixelGrid,{data:data.turtleFinal,cols:data.C,cellSize:22,colorScale:suitSc,label:"Merged"}))
            ),
            e("div",{style:{fontSize:10,color:C.cyan,marginTop:6,textAlign:"center"}},"ER embedded in values \u2192 er_score=100 at scoring time")
          )
        ),
        anim>=2 && e(FadeIn,{delay:200},
          e("div",{style:{marginTop:14,padding:12,background:"#0d1520",borderRadius:8,border:"1px solid "+C.border,fontSize:12,color:C.textDim,lineHeight:1.6}},
            e("strong",{style:{color:C.cyan}},"Key difference: "),"Endangered DPS cells (ER=100) keep full suitability. Threatened DPS cells (ER=50) are halved. This means the merged raster already reflects conservation priority spatially."))
      );
    }

    // --- step: masking ---
    if (sid==="masking") {
      return e("div",null,
        e("h3",{style:{color:C.text,fontSize:18,fontWeight:700,marginBottom:8}},"Step 3: Spatial Masking"),
        e("p",{style:{color:C.textDim,fontSize:13,lineHeight:1.6,marginBottom:12}},"Range maps constrain where AquaMaps predictions are valid. Cells outside the range are set to null, preventing predictions beyond known distributions."),
        e("div",{style:{display:"flex",gap:20,justifyContent:"center",alignItems:"center",flexWrap:"wrap"}},
          e(PixelGrid,{data:data.merged,cols:data.C,cellSize:cs,colorScale:suitSc,label:"Before Masking"}),
          e("div",{style:{textAlign:"center"}},
            e("div",{style:{fontSize:28,marginBottom:4}},"\u2192"),
            e("div",{style:{fontSize:10,color:C.textDim}},"Apply mask")),
          e(PixelGrid,{data:data.masked,cols:data.C,cellSize:cs,colorScale:suitSc,label:"After Masking",animate:true})
        ),
        e(FadeIn,{delay:600},
          e("div",{style:{marginTop:16,padding:12,background:"#0d1520",borderRadius:8,border:"1px solid "+C.border}},
            e("div",{style:{fontSize:12,color:C.textDim,lineHeight:1.6}},
              e("strong",{style:{color:C.amber}},"Mask priority: "),"SWOT+DPS (turtles) \u2192 BirdLife \u2192 IUCN. Cells outside become null.")))
      );
    }

    // --- step: floors ---
    if (sid==="floors") {
      var boosted=data.masked.map(function(v){return v===null?null:(v<20?20:v);});
      var fc=data.masked.map(function(v,i){return v!==null&&v<20?i:-1;}).filter(function(i){return i>=0;});
      return e("div",null,
        e("h3",{style:{color:C.text,fontSize:18,fontWeight:700,marginBottom:8}},"Step 4: Regulatory Floors"),
        e("p",{style:{color:C.textDim,fontSize:13,lineHeight:1.6,marginBottom:12}},"Federal protections set minimum cell values. Marine mammals: floor 20 (MMPA). Migratory birds: floor 10 (MBTA)."),
        e("div",{style:{display:"flex",gap:16,justifyContent:"center",marginBottom:12}},
          e("div",{style:{padding:"8px 14px",background:C.panelLight,borderRadius:8,border:"1px solid "+C.border,textAlign:"center"}},
            e("div",{style:{fontSize:10,color:C.textDim,marginBottom:4}},"MMPA (Marine Mammals)"),
            e("div",{style:{fontSize:22,fontWeight:700,color:C.purple}},"Floor: 20")),
          e("div",{style:{padding:"8px 14px",background:C.panelLight,borderRadius:8,border:"1px solid "+C.border,textAlign:"center"}},
            e("div",{style:{fontSize:10,color:C.textDim,marginBottom:4}},"MBTA (Migratory Birds)"),
            e("div",{style:{fontSize:22,fontWeight:700,color:C.amber}},"Floor: 10"))
        ),
        e(Formula,{tex:"v(c) = max( v_merged(c), floor )",note:"MMPA floor=20 > MBTA floor=10"}),
        e("div",{style:{display:"flex",gap:20,justifyContent:"center",alignItems:"center"}},
          e(PixelGrid,{data:data.masked,cols:data.C,cellSize:cs,colorScale:suitSc,label:"Before Floor",highlight:fc}),
          e("div",{style:{fontSize:28,color:C.textDim}},"\u2192"),
          e(PixelGrid,{data:boosted,cols:data.C,cellSize:cs,colorScale:suitSc,label:"After MMPA Floor (20)",highlight:fc,animate:true})
        ),
        fc.length>0 && e("div",{style:{marginTop:8,textAlign:"center",fontSize:11,color:C.purple}},fc.length+" cells boosted to minimum of 20"),
        e(FadeIn,{delay:400},
          e("div",{style:{marginTop:12,padding:10,background:"#0d1520",borderRadius:8,border:"1px solid "+C.border,fontSize:11,color:C.textDim,lineHeight:1.6}},
            e("strong",{style:{color:C.purple}},"v5 fix: "),"MMPA floor now applies to ",e("em",null,"all")," marine mammals, including FWS-managed species (walrus, polar bear, sea otter, manatee, dugong) that were missed in earlier versions."))
      );
    }

    // --- step: ER weighting ---
    if (sid==="erweight") {
      var mkBar=function(items){return items.map(function(it){return e("div",{key:it[0],style:{display:"flex",justifyContent:"space-between",marginBottom:3}},e("span",{style:{fontSize:10,color:C.textDim}},it[0]),e("div",{style:{display:"flex",alignItems:"center",gap:4}},e("div",{style:{width:it[1]*0.7,height:7,background:it[2],borderRadius:4}}),e("span",{style:{fontSize:10,color:it[2],fontWeight:600,width:20}},it[1])));});};
      return e("div",null,
        e("h3",{style:{color:C.text,fontSize:18,fontWeight:700,marginBottom:8}},"Step 5: Extinction Risk Weighting"),
        e("p",{style:{color:C.textDim,fontSize:13,lineHeight:1.6,marginBottom:12}},"Each species\u2019 suitability is weighted by its extinction risk score. Species are summed per cell within each category."),
        e(Formula,{tex:"score(c, cat) = \u03A3 [ er_score(s) \u00D7 v(s,c) / 100 ]",note:"Standard approach: scalar ER \u00D7 suitability. For turtles: er_score=100 (ER already embedded)."}),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:12}},
          e("div",{style:{background:C.panelLight,borderRadius:8,padding:10,border:"1px solid "+C.border}},
            e("div",{style:{fontSize:11,color:C.red,fontWeight:600,marginBottom:6}},"US Federal (ESA)"),
            mkBar([["Endangered",100,"#ef4444"],["Threatened",50,"#f59e0b"],["MMPA only",20,"#8b5cf6"],["MBTA only",10,"#a78bfa"],["Default/LC",1,"#475569"]])),
          e("div",{style:{background:C.panelLight,borderRadius:8,padding:10,border:"1px solid "+C.border}},
            e("div",{style:{fontSize:11,color:C.orange,fontWeight:600,marginBottom:6}},"IUCN Red List"),
            mkBar([["Critically Endangered",50,"#ef4444"],["Endangered",25,"#f97316"],["Vulnerable",5,"#f59e0b"],["Near Threatened",2,"#84cc16"],["Least Concern",1,"#475569"]]))
        ),
        e(FadeIn,{delay:300},
          e("div",{style:{marginTop:14,padding:12,background:"#0d1520",borderRadius:8,border:"1px solid "+C.border}},
            e("div",{style:{fontSize:12,color:C.textDim,lineHeight:1.6}},
              e("strong",{style:{color:C.cyan}},"Two approaches: "),"Standard species: scalar ER \u00D7 suitability. Turtles: ER already embedded via multiplicative merge (Step 2b), so er_score = 100 as pass-through.")))
      );
    }

    // --- step: ecoregional rescaling ---
    if (sid==="ecorescale") {
      // ecoregion region outline: 3 cols for A, 2 cols for B, full grid height
      var gapPx = 1; // gap between cells
      var ecoAw = 3*cs + 2*gapPx; // width of ecoregion A (3 cols + 2 gaps)
      var ecoBw = 2*cs + 1*gapPx; // width of ecoregion B (2 cols + 1 gap)
      var gridH = 5*cs + 4*gapPx; // full grid height (5 rows + 4 gaps)
      var ecoOverlay = function() {
        return e("div",{style:{position:"absolute",top:0,left:0,width:ecoAw+gapPx+ecoBw,height:gridH,pointerEvents:"none"}},
          e("div",{style:{position:"absolute",top:0,left:0,width:ecoAw,height:gridH,border:"2px solid #f59e0baa",borderRadius:4}}),
          e("div",{style:{position:"absolute",top:0,left:ecoAw+gapPx,width:ecoBw,height:gridH,border:"2px solid #3b82f6aa",borderRadius:4}})
        );
      };
      return e("div",null,
        e("h3",{style:{color:C.text,fontSize:18,fontWeight:700,marginBottom:8}},"Step 6: Ecoregional Rescaling"),
        e("p",{style:{color:C.textDim,fontSize:13,lineHeight:1.6,marginBottom:12}},"Raw scores (summed ER-weighted species contributions, often in the hundreds) are rescaled to 0\u2013100 within each BOEM Ecoregion, ",e("strong",{style:{color:C.text}},"per component")," (bird, mammal, fish, etc.). This prevents species-rich zones from dominating."),
        e(Formula,{tex:"score'(c) = [ score(c) \u2212 min_eco ] / [ max_eco \u2212 min_eco ] \u00D7 100",note:"Applied per component (bird, coral, fish, invertebrate, mammal, other, turtle, primary prod.) within each ecoregion"}),
        e("div",{style:{display:"flex",gap:6,justifyContent:"center",marginBottom:10}},
          e("span",{style:{fontSize:11,padding:"3px 10px",background:"#f59e0b22",border:"1.5px solid #f59e0baa",borderRadius:12,color:"#f59e0b"}},"Ecoregion A (left 3 cols)"),
          e("span",{style:{fontSize:11,padding:"3px 10px",background:"#3b82f622",border:"1.5px solid #3b82f6aa",borderRadius:12,color:"#3b82f6"}},"Ecoregion B (right 2 cols)")),
        e("div",{style:{fontSize:12,color:C.amber,fontWeight:600,marginBottom:6}},"Mammal component (example):"),
        e("div",{style:{display:"flex",gap:14,justifyContent:"center",alignItems:"center",flexWrap:"wrap"}},
          e("div",{style:{textAlign:"center"}},
            e("div",{style:{fontSize:11,color:C.textDim,marginBottom:4,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}},"Raw Score (\u03A3 ER\u00D7suit)"),
            e("div",{style:{position:"relative",display:"inline-block"}},
              e("div",{style:{display:"inline-grid",gridTemplateColumns:"repeat("+data.C+", "+cs+"px)",gap:gapPx}},
                data.rawB.map(function(val,i) {
                  return e("div",{key:i,style:{width:cs,height:cs,backgroundColor:rawSc(val),borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:val>99?9:11,fontWeight:600,color:val>400?"#000":C.text,border:"1px solid #0004"}},Math.round(val));
                })
              ),
              ecoOverlay()
            )),
          e("div",{style:{textAlign:"center"}},
            e("div",{style:{fontSize:10,color:C.textDim,marginBottom:4}},"Per-Ecoregion min/max"),
            e("div",{style:{fontSize:10,padding:"3px 6px",background:"#f59e0b11",borderRadius:4,marginBottom:3}},e("span",{style:{color:"#f59e0b"}},"A: "+data.bMM.A.min+"\u2013"+data.bMM.A.max)),
            e("div",{style:{fontSize:10,padding:"3px 6px",background:"#3b82f611",borderRadius:4}},e("span",{style:{color:"#3b82f6"}},"B: "+data.bMM.B.min+"\u2013"+data.bMM.B.max)),
            e("div",{style:{fontSize:24,color:C.textDim,marginTop:4}},"\u2192")),
          e("div",{style:{textAlign:"center"}},
            e("div",{style:{fontSize:11,color:C.textDim,marginBottom:4,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}},"Rescaled [0\u2013100]"),
            e("div",{style:{position:"relative",display:"inline-block"}},
              e("div",{style:{display:"inline-grid",gridTemplateColumns:"repeat("+data.C+", "+cs+"px)",gap:gapPx}},
                data.rB.map(function(val,i) {
                  return e("div",{key:i,style:{width:cs,height:cs,backgroundColor:spectral(val),borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:val>60?"#000":C.text,border:"1px solid #0004",transition:"all 0.5s ease"}},Math.round(val));
                })
              ),
              ecoOverlay()
            ))
        ),
        e(FadeIn,{delay:600},
          e("div",{style:{marginTop:12,padding:10,background:"#0d1520",borderRadius:8,border:"1px solid "+C.border,fontSize:11,color:C.textDim,lineHeight:1.6}},
            e("strong",{style:{color:C.text}},"Key: "),"100 = most sensitive cell ",e("em",null,"for that component within that ecoregion"),", not globally. Rescaling is done independently for each of the 8 components. Scores are comparable within ecoregions only."))
      );
    }

    // --- step: component averaging ---
    if (sid==="component") {
      return e("div",null,
        e("h3",{style:{color:C.text,fontSize:18,fontWeight:700,marginBottom:8}},"Step 7: Component Averaging"),
        e("p",{style:{color:C.textDim,fontSize:13,lineHeight:1.6,marginBottom:12}},"The 8 rescaled components (7 species categories + primary productivity) are averaged with equal weights."),
        e(Formula,{tex:"score(cell) = AVG( bird', coral', fish', invert', mammal', other', turtle', primprod' )",note:"Each component already rescaled [0\u2013100] within its ecoregion"}),
        e("div",{style:{display:"flex",gap:8,justifyContent:"center",alignItems:"center",flexWrap:"wrap",marginTop:8}},
          e(PixelGrid,{data:data.rB,cols:data.C,cellSize:24,colorScale:spectral,label:"Bird"}),
          e("div",{style:{fontSize:16,color:C.textDim}},"+"),
          e(PixelGrid,{data:data.rM,cols:data.C,cellSize:24,colorScale:spectral,label:"Mammal"}),
          e("div",{style:{fontSize:16,color:C.textDim}},"+"),
          e(PixelGrid,{data:data.rF,cols:data.C,cellSize:24,colorScale:spectral,label:"Fish"}),
          e("div",{style:{fontSize:16,color:C.textDim}},"="),
          e(PixelGrid,{data:data.avg,cols:data.C,cellSize:24,colorScale:spectral,label:"Average",animate:true})
        ),
        e(FadeIn,{delay:400},
          e("div",{style:{marginTop:14}},
            e("div",{style:{fontSize:12,color:C.text,fontWeight:600,marginBottom:6}},"All 8 components:"),
            e("div",{style:{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center"}},
              Object.keys(SP_COLORS).map(function(cat){return e("div",{key:cat,style:{padding:"3px 8px",background:SP_COLORS[cat]+"22",border:"1px solid "+SP_COLORS[cat]+"44",borderRadius:12,fontSize:10,color:SP_COLORS[cat],fontWeight:500}},cat==="primprod"?"Primary Prod.":cat.charAt(0).toUpperCase()+cat.slice(1));}))))
      );
    }

    // --- step: final score ---
    if (sid==="final") {
      var vals=data.avg.filter(function(v){return v!==null;});
      var mean=Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length);
      return e("div",null,
        e("h3",{style:{color:C.text,fontSize:18,fontWeight:700,marginBottom:8}},"Step 8: Final Score & Aggregation"),
        e("p",{style:{color:C.textDim,fontSize:13,lineHeight:1.6,marginBottom:12}},"Cell-level scores are aggregated to Program Areas, Subregions, and Ecoregions using area-weighted averaging."),
        e(Formula,{tex:"score(zone) = \u03A3[ score'(c) \u00D7 A(c) ] / \u03A3[ A(c) ]",note:"A(c) = cell area; summed over cells within the zone"}),
        e("div",{style:{textAlign:"center",marginTop:16}},
          e(PixelGrid,{data:data.avg,cols:data.C,cellSize:cs,colorScale:spectral,label:"Cell-Level Final Scores",animate:true}),
          e(FadeIn,{delay:500},
            e("div",{style:{marginTop:14,display:"inline-block",padding:"14px 28px",background:"linear-gradient(135deg, "+C.panelLight+", #1a2744)",borderRadius:12,border:"2px solid "+C.accent}},
              e("div",{style:{fontSize:10,color:C.textDim,marginBottom:3}},"Program Area Score"),
              e("div",{style:{fontSize:36,fontWeight:700,color:C.accent}},e(AnimNum,{value:mean})),
              e("div",{style:{fontSize:10,color:C.textDim}},"out of 100")))
        ),
        e(FadeIn,{delay:800},
          e("div",{style:{marginTop:16,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}},
            [{l:"Program Areas",d:"20 BOEM planning regions",i:"\uD83D\uDDFA\uFE0F"},{l:"Subregions",d:"Alaska, Pacific, Gulf, USA",i:"\uD83C\uDFD4\uFE0F"},{l:"Ecoregions",d:"12 BOEM ecological zones",i:"\uD83C\uDF0A"}].map(function(z){return e("div",{key:z.l,style:{background:C.panelLight,borderRadius:8,padding:10,border:"1px solid "+C.border,textAlign:"center"}},e("div",{style:{fontSize:18}},z.i),e("div",{style:{fontSize:11,color:C.text,fontWeight:600,marginTop:3}},z.l),e("div",{style:{fontSize:9,color:C.textDim}},z.d));})))
      );
    }
  }

  // --- app shell ---
  return e("div",{ref:rootRef,style:{background:C.bg,color:C.text,fontFamily:"'Inter',system-ui,sans-serif",minHeight:isFS?"100vh":560,overflow:isFS?"auto":"visible"}},
    // header
    e("div",{style:{background:"linear-gradient(90deg,"+C.panel+",#0f1d35)",borderBottom:"1px solid "+C.border,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      e("div",{style:{display:"flex",alignItems:"center",gap:10}},
        e("div",{style:{fontSize:18}},"\uD83C\uDF0A"),
        e("div",null,
          e("div",{style:{fontSize:14,fontWeight:700,color:C.text}},"Marine Sensitivity Toolkit"),
          e("div",{style:{fontSize:10,color:C.textDim}},"Scoring Pipeline Walkthrough"))),
      e("div",{style:{display:"flex",alignItems:"center",gap:10}},
        e("div",{style:{fontSize:10,color:C.textDim}},"Step "+(step+1)+"/"+STEPS.length),
        e("button",{onClick:toggleFS,title:isFS?"Exit fullscreen":"Fullscreen",style:{background:"transparent",border:"1px solid "+C.border,borderRadius:6,color:C.textDim,padding:"3px 7px",cursor:"pointer",fontSize:14,lineHeight:1}},isFS?"\u2716":"\u26F6"))
    ),
    // step tabs
    e("div",{style:{display:"flex",overflowX:"auto",background:C.panel,borderBottom:"1px solid "+C.border,padding:"0 6px"}},
      STEPS.map(function(s,i){return e("button",{key:s.id,onClick:function(){setStep(i);setAnim(0);},style:{
        background:i===step?C.accentDim:"transparent",
        border:"none",borderBottom:i===step?"2px solid "+C.accent:"2px solid transparent",
        color:i===step?C.accent:i<step?C.green:C.textMuted,
        padding:"7px 10px",fontSize:10,fontWeight:i===step?700:500,
        cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.2s",
        display:"flex",alignItems:"center",gap:"3px"
      }},e("span",{style:{fontSize:12}},s.icon),e("span",null,s.title));})
    ),
    // content
    e("div",{style:{padding:"18px 20px",maxWidth:880,margin:"0 auto",paddingBottom:60}},renderStep()),
    // nav footer
    e("div",{style:{background:C.panel,borderTop:"1px solid "+C.border,padding:"8px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      e("button",{onClick:prev,disabled:step===0,style:{background:step===0?C.panelLight:C.accent,border:"none",borderRadius:8,color:step===0?C.textMuted:"#fff",padding:"7px 18px",fontSize:12,fontWeight:600,cursor:step===0?"default":"pointer",transition:"background 0.2s"}},"\u2190 Previous"),
      e("div",{style:{display:"flex",gap:3}},STEPS.map(function(_,i){return e("div",{key:i,onClick:function(){setStep(i);setAnim(0);},style:{width:7,height:7,borderRadius:"50%",background:i===step?C.accent:i<step?C.green:C.textMuted,cursor:"pointer",transition:"all 0.3s"}});})),
      e("button",{onClick:next,disabled:step===STEPS.length-1,style:{background:step===STEPS.length-1?C.panelLight:C.accent,border:"none",borderRadius:8,color:step===STEPS.length-1?C.textMuted:"#fff",padding:"7px 18px",fontSize:12,fontWeight:600,cursor:step===STEPS.length-1?"default":"pointer",transition:"background 0.2s"}},"Next \u2192")
    )
  );
}

ReactDOM.render(e(App), document.getElementById("mst-walkthrough-root"));
</script>
